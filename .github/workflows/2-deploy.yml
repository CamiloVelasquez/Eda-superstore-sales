name: "2 · Deploy a EC2"

# Se dispara automáticamente en cada push a main.
# También se puede ejecutar manualmente desde Actions → Run workflow.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "infra/**"
      - "*.ipynb"
      - ".github/workflows/1-infra.yml"
  workflow_dispatch:

env:
  STACK_NAME: superstore-sales
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    name: Deploy · ${{ github.ref_name }}@${{ github.sha }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Obtener Instance ID desde CloudFormation ───────────────────────────────
      - name: Obtener Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Stack '$STACK_NAME' no encontrado. Ejecuta primero el workflow '1 · Infraestructura'."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instancia: $INSTANCE_ID"

      # ── Esperar SSM (importante en el primer deploy, o si la instancia se reinició) ──
      - name: Esperar SSM agent
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          echo "Esperando agente SSM..."
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            echo "  [$i/20] $STATUS"
            [ "$STATUS" = "Online" ] && { echo "SSM listo."; break; }
            [ "$i" -eq 20 ] && { echo "::error::SSM no respondió."; exit 1; }
            sleep 30
          done

      # ── Deploy: git pull + docker compose up ──────────────────────────────────
      # Docker/Buildx/Compose ya están instalados via CloudFormation UserData.
      # Los comandos se pasan directamente como array JSON (sin base64).
      - name: Desplegar aplicación
        id: deploy
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          APP_DIR="/opt/superstore-sales"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -euo pipefail\",
              \"if [ -d $APP_DIR/.git ]; then cd $APP_DIR && git fetch origin && git reset --hard origin/main; else git clone $REPO_URL $APP_DIR && cd $APP_DIR; fi\",
              \"cd $APP_DIR\",
              \"docker compose down --remove-orphans 2>/dev/null || true\",
              \"docker compose up --build -d\",
              \"sleep 8 && docker compose ps\"
            ],executionTimeout=[\"900\"]" \
            --comment "Deploy ${{ github.ref_name }}@${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy command ID: $CMD_ID"

          # Esperar hasta 15 min (90 intentos × 10 s)
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")

            echo "  [$i/90] $STATUS"
            [ "$STATUS" = "Success" ] && { echo "Deploy exitoso."; break; }

            if echo "$STATUS" | grep -qE '^(Failed|TimedOut|Cancelled|DeliveryTimedOut)$'; then
              echo "::error::Deploy falló: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            [ "$i" -eq 90 ] && { echo "::error::Timeout."; exit 1; }
            sleep 10
          done

      # ── Logs del deploy ────────────────────────────────────────────────────────
      - name: Logs de deploy
        if: always() && steps.deploy.outputs.cmd_id != ''
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true

      # ── Resumen ────────────────────────────────────────────────────────────────
      - name: Resumen de URLs
        if: success()
        run: |
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)

          echo "### ✅ Deploy completado" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Streamlit | http://${PUBLIC_IP}:8501 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MLflow    | http://${PUBLIC_IP}:5000 |" >> "$GITHUB_STEP_SUMMARY"

          echo "Streamlit → http://${PUBLIC_IP}:8501"
          echo "MLflow    → http://${PUBLIC_IP}:5000"
