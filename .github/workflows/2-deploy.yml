name: "2 · Deploy a EC2"

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "infra/**"
      - "*.ipynb"
      - ".github/workflows/1-infra.yml"
  workflow_dispatch:

env:
  STACK_NAME: superstore-sales
  AWS_REGION: ${{ secrets.AWS_REGION }}

# Permiso para publicar imágenes en GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build y push imagen → GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nombre de la imagen (minúsculas)
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Imagen: $IMAGE"

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          # Caché entre builds: reutiliza capas si Dockerfile/dependencias no cambiaron
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}
          cache-to: type=inline

  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Stack '$STACK_NAME' no encontrado. Ejecuta primero el workflow '1 · Infraestructura'."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instancia: $INSTANCE_ID"

      - name: Esperar SSM agent
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          echo "Esperando agente SSM..."
          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            echo "  [$i/20] $STATUS"
            [ "$STATUS" = "Online" ] && { echo "SSM listo."; break; }
            [ "$i" -eq 20 ] && { echo "::error::SSM no respondió."; exit 1; }
            sleep 30
          done

      # Instala Docker + Buildx + Compose si no están presentes (solo ocurre la primera vez)
      - name: Setup Docker en EC2
        id: setup
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -euo pipefail\",
              \"if ! command -v docker &>/dev/null; then dnf install -y docker git && systemctl enable --now docker; fi\",
              \"PLUGINS=/usr/local/lib/docker/cli-plugins && mkdir -p \$PLUGINS\",
              \"if ! docker compose version &>/dev/null; then BUILDX_VER=\$(curl -fsSL https://api.github.com/repos/docker/buildx/releases/latest | python3 -c 'import sys,json; print(json.load(sys.stdin)[\\\"tag_name\\\"])') && curl -fsSL \\\"https://github.com/docker/buildx/releases/download/\${BUILDX_VER}/buildx-\${BUILDX_VER}.linux-amd64\\\" -o \$PLUGINS/docker-buildx && chmod +x \$PLUGINS/docker-buildx && curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o \$PLUGINS/docker-compose && chmod +x \$PLUGINS/docker-compose; fi\",
              \"docker --version && docker compose version\"
            ],executionTimeout=[\"300\"]" \
            --comment "Setup Docker" \
            --query 'Command.CommandId' \
            --output text)

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Setup command ID: $CMD_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")
            echo "  [$i/30] $STATUS"
            [ "$STATUS" = "Success" ] && { echo "Setup exitoso."; break; }
            if echo "$STATUS" | grep -qE '^(Failed|TimedOut|Cancelled|DeliveryTimedOut)$'; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            [ "$i" -eq 30 ] && { echo "::error::Timeout setup."; exit 1; }
            sleep 10
          done

      # La imagen ya está construida en GHCR.
      # La EC2 solo hace: git pull + docker pull + docker compose up (sin build).
      - name: Desplegar aplicación
        id: deploy
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          APP_DIR="/opt/superstore-sales"
          IMAGE="${{ needs.build.outputs.image }}"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -euo pipefail\",
              \"if [ -d $APP_DIR/.git ]; then cd $APP_DIR && git fetch origin && git reset --hard origin/main; else git clone $REPO_URL $APP_DIR && cd $APP_DIR; fi\",
              \"cd $APP_DIR\",
              \"docker pull $IMAGE\",
              \"docker compose down --remove-orphans 2>/dev/null || true\",
              \"IMAGE_NAME=$IMAGE docker compose up -d\",
              \"sleep 8 && docker compose ps\"
            ],executionTimeout=[\"600\"]" \
            --comment "Deploy ${{ github.ref_name }}@${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy command ID: $CMD_ID"

          # Esperar hasta 10 min (40 intentos × 15 s)
          # El deploy es rápido: solo pull + restart, sin build
          for i in $(seq 1 40); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")

            echo "  [$i/40] $STATUS"
            [ "$STATUS" = "Success" ] && { echo "Deploy exitoso."; break; }

            if echo "$STATUS" | grep -qE '^(Failed|TimedOut|Cancelled|DeliveryTimedOut)$'; then
              echo "::error::Deploy falló: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            [ "$i" -eq 40 ] && { echo "::error::Timeout."; exit 1; }
            sleep 15
          done

      - name: Logs de deploy
        if: always() && steps.deploy.outputs.cmd_id != ''
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true

      - name: Resumen de URLs
        if: success()
        run: |
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)

          echo "### ✅ Deploy completado" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Imagen:** \`${{ needs.build.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Streamlit | http://${PUBLIC_IP}:8501 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MLflow    | http://${PUBLIC_IP}:5000 |" >> "$GITHUB_STEP_SUMMARY"

          echo "Streamlit → http://${PUBLIC_IP}:8501"
          echo "MLflow    → http://${PUBLIC_IP}:5000"
