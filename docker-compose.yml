# Orquestación del proyecto MLOps Superstore.
#
#   mlflow    -> servidor de tracking + UI (http://localhost:5000), datos en un volumen
#   streamlit -> app de predicción (http://localhost:8501)
#               Arranca en cuanto MLflow esté listo.
#               El entrenamiento se dispara desde el botón en la interfaz.
#
# Uso:  docker compose up --build

services:
  mlflow:
    build: .
    image: ${IMAGE_NAME:-superstore-mlops:latest}
    command: >
      uv run mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --allowed-hosts *
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  streamlit:
    image: ${IMAGE_NAME:-superstore-mlops:latest}
    command: >
      uv run streamlit run src/app.py
      --server.port=8501 --server.address=0.0.0.0
      --server.enableCORS=false --server.enableXsrfProtection=false
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    ports:
      - "8501:8501"
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  mlflow-data:
