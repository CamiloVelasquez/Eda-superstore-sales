# Orquestación del proyecto MLOps Superstore.
#
#   mlflow    -> servidor de tracking + UI (http://localhost:5000), datos en un volumen
#   trainer   -> entrena y registra el mejor modelo, luego termina (corre una sola vez)
#   streamlit -> app para usar el modelo (http://localhost:8501)
#
# Uso:  docker compose up --build
# La primera vez el 'trainer' entrena (~2-4 min); la app arranca cuando termina.

services:
  mlflow:
    build: .
    image: superstore-mlops:latest
    command: >
      uv run mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  trainer:
    build: .
    image: superstore-mlops:latest
    command: uv run python model_pipeline.py
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SKIP_IF_REGISTERED: "1"   # no re-entrena si ya hay un modelo registrado
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"

  streamlit:
    build: .
    image: superstore-mlops:latest
    command: >
      uv run streamlit run streamlit_app.py
      --server.port=8501 --server.address=0.0.0.0
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    depends_on:
      mlflow:
        condition: service_healthy
      trainer:
        condition: service_completed_successfully

volumes:
  mlflow-data:
